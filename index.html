<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="sidebar-container">
                <div class="logo">
                    <h2>MyApp</h2>
                    <h6>Finance-dashboard</h6>

                </div>
                <div class="sidebar-content">
                    <div class="slides">
                        <a href="#Home">Home</a>
                        <a href="#Transactions">Transactions</a>
                        <a href="#help">Help & Support</a>
                    </div>

                </div>
            </div>

        </div>
        <div class="main-dashboard">
            <div class="header">
                <div class="header-content">
                    <div class="searchBox">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Browse anything...">
                    </div>
                    <div class="icons">
                        <a href="#"><i class="fa-regular fa-comment-dots"></i>Feedback</a>
                        <span>Welcome! User</span>
                        <div class="role">
                            <select id="roleSelect">
                                <option value="admin">Admin</option>
                                <option value="viewer">Viewer</option>
                            </select>
                        </div>
                    </div>
                </div>

            </div>
            <div class="dashboard-cards">
                <div class="cards">
                    <div class="card balance">
                        <h3>Balance</h3>
                        <p id="balance">0</p>
                    </div>
                    <div class="card income">
                        <h3>Income</h3>
                        <p id="income">0</p>
                    </div>
                    <div class="card expense">
                        <h3>Expenses</h3>
                        <p id="expense">0</p>
                    </div>
                </div>
                <div class="dashboard-data">
                    <div class="transactions">
                        <div class="transactions-title">
                            <h3>Recent Activity</h3>
                            <div class="controls">
                                <input type="text" id="search" placeholder="Search...">

                                <select id="filterType">
                                    <option value="all">All</option>
                                    <option value="income">Income</option>
                                    <option value="expense">Expense</option>
                                </select>

                                <select id="sortAmount">
                                    <option value="default">Sort</option>
                                    <option value="low">Low to High</option>
                                    <option value="high">High to Low</option>
                                </select>
                            </div>
                        </div>
                        <div class="transactions-details">
                            <div class="transaction-tab">
                                <table>
                                    <thead id="transactionList">
                                        <tr>
                                            <th>Date</th>
                                            <th>Amount</th>
                                            <th>catagory</th>
                                            <th>Type</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    <div class="add-items">
                        <h3>Add Your Money Flow</h3>
                        <div class="form">
                            <form onsubmit="return false;" action="#">
                                <div class="add-amount">
                                    <label for="amount">Amount:</label>
                                    <input type="number" name="amount" id="add-amount">
                                </div>
                                <div class="add-type">
                                    <label for="type">Type:</label>
                                    <select name="type" id="type">
                                        <option value="select">Select</option>
                                        <option value="Expense">Expense</option>
                                        <option value="Income">Income</option>
                                    </select>
                                </div>
                                <div class="add-catagory">
                                    <label for="">catagory:</label>
                                    <input type="text" name="catagory" id="add-catagory">
                                </div>
                                <div class="add-date">
                                    <label for="date">Date:</label>
                                    <input type="date" name="date" id="add-date">
                                </div>
                            </form>
                            <button id="submit" onclick="addTransactions(event)" type="button">Add</button>
                        </div>
                    </div>
                </div>
                <div class="mychart">
                    <canvas id="myChart"></canvas>
                </div>
                <div class="chart-insights">
                    <div class="chart-container">
                        <h3>Spending Breakdown</h3>
                        <canvas id="pieChart"></canvas>
                    </div>
                    <div class="insights">
                        <h2>Insights</h2>
                        <div id="categoryList" >
                            
                        </div>
                    </div>

                </div>



            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
